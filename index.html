<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="律">
<title>律</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --card: #181818;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --text: #e8e4dc;
    --text-dim: #666;
    --success: #4a7c59;
    --fail: #7c3a3a;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* Header */
  .header {
    padding: 56px 24px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold);
  }
  .header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 4px;
  }
  .today-date {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Pages */
  .page { display: none; padding: 24px; }
  .page.active { display: block; }

  /* Today cards */
  .habit-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .habit-card.done {
    border-color: var(--gold-dim);
    background: #1a1a12;
  }

  .habit-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .habit-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .streak-badge {
    background: var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .streak-badge.hot {
    background: #2a1f00;
    color: var(--gold);
  }

  .big-btn {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 16px;
    font-family: 'Noto Serif JP', serif;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .big-btn.done {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
    font-weight: 700;
  }
  .big-btn.failed {
    background: var(--fail);
    border-color: var(--fail);
    color: #ffaaaa;
  }

  .status-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .status-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Noto Serif JP', serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .status-btn.active-ok {
    background: var(--success);
    border-color: var(--success);
    color: #aaffcc;
  }
  .status-btn.active-ng {
    background: var(--fail);
    border-color: var(--fail);
    color: #ffaaaa;
  }

  /* Calendar */
  .cal-section {
    margin-bottom: 32px;
  }
  .cal-title {
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cal-nav {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .cal-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .cal-month-label {
    font-size: 14px;
    color: var(--text);
    min-width: 80px;
    text-align: center;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 0;
    letter-spacing: 0.05em;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--card);
    position: relative;
  }
  .cal-day.empty { background: transparent; }
  .cal-day.ok { background: var(--success); color: #aaffcc; font-weight: 700; }
  .cal-day.ng { background: var(--fail); color: #ffaaaa; }
  .cal-day.today-mark { outline: 2px solid var(--gold); outline-offset: -2px; }

  /* Streak summary */
  .streak-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .streak-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .streak-card .s-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .streak-card .s-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .streak-card .s-unit {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>律</h1>
  <div class="subtitle">DISCIPLINE TRACKER</div>
  <div class="today-date" id="todayLabel"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">今日</div>
  <div class="tab" onclick="switchTab('toilet')">トイレ掃除</div>
  <div class="tab" onclick="switchTab('drink')">禁酒</div>
</div>

<!-- TODAY PAGE -->
<div class="page active" id="page-today">

  <!-- Toilet card -->
  <div class="habit-card" id="card-toilet">
    <div class="habit-top">
      <div class="habit-name">トイレ掃除</div>
      <div class="streak-badge" id="streak-toilet-today">0日連続</div>
    </div>
    <div class="status-row">
      <button class="status-btn" id="btn-toilet-ok" onclick="setStatus('toilet', 'ok')">✓ 達成</button>
      <button class="status-btn" id="btn-toilet-ng" onclick="setStatus('toilet', 'ng')">✗ 未達成</button>
    </div>
  </div>

  <!-- Drink card -->
  <div class="habit-card" id="card-drink">
    <div class="habit-top">
      <div class="habit-name">禁酒</div>
      <div class="streak-badge" id="streak-drink-today">0日連続</div>
    </div>
    <div class="status-row">
      <button class="status-btn" id="btn-drink-ok" onclick="setStatus('drink', 'ok')">✓ 達成</button>
      <button class="status-btn" id="btn-drink-ng" onclick="setStatus('drink', 'ng')">✗ 未達成</button>
    </div>
  </div>

</div>

<!-- TOILET CALENDAR PAGE -->
<div class="page" id="page-toilet">
  <div class="streak-summary" id="summary-toilet"></div>
  <div class="cal-section">
    <div class="cal-title">
      <span>記録カレンダー</span>
      <div class="cal-nav">
        <button onclick="changeMonth('toilet', -1)">‹</button>
        <span class="cal-month-label" id="cal-label-toilet"></span>
        <button onclick="changeMonth('toilet', 1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-toilet"></div>
  </div>
</div>

<!-- DRINK CALENDAR PAGE -->
<div class="page" id="page-drink">
  <div class="streak-summary" id="summary-drink"></div>
  <div class="cal-section">
    <div class="cal-title">
      <span>記録カレンダー</span>
      <div class="cal-nav">
        <button onclick="changeMonth('drink', -1)">‹</button>
        <span class="cal-month-label" id="cal-label-drink"></span>
        <button onclick="changeMonth('drink', 1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-drink"></div>
  </div>
</div>

<script>
const KEY = "ritsu_v1";
let data = JSON.parse(localStorage.getItem(KEY) || "{}");
let calMonths = { toilet: new Date(), drink: new Date() };

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function setStatus(habit, status) {
  const k = todayStr();
  if (!data[k]) data[k] = {};
  // toggle: if same status clicked again, remove it
  if (data[k][habit] === status) {
    delete data[k][habit];
  } else {
    data[k][habit] = status;
  }
  save();
  renderAll();
}

function getStreak(habit) {
  const today = new Date();
  today.setHours(0,0,0,0);
  let streak = 0;
  let d = new Date(today);
  while (true) {
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const val = data[k] && data[k][habit];
    const isPast = d < today;
    const isToday = d.getTime() === today.getTime();
    // 今日は入力なしでも連続を止めない（まだ入力できるから）
    if (val === 'ok') {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (isToday && val === undefined) {
      // 今日未入力はスキップして昨日以前を見る
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getBestStreak(habit) {
  const keys = Object.keys(data).sort();
  let best = 0, cur = 0;
  for (const k of keys) {
    if (data[k][habit] === 'ok') {
      cur++;
      if (cur > best) best = cur;
    } else {
      cur = 0;
    }
  }
  return best;
}

function getTotalOk(habit) {
  return Object.values(data).filter(v => v[habit] === 'ok').length;
}

function renderToday() {
  const k = todayStr();
  const d = data[k] || {};
  const today = new Date();
  document.getElementById('todayLabel').textContent =
    today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';

  ['toilet', 'drink'].forEach(habit => {
    const val = d[habit];
    const okBtn = document.getElementById('btn-' + habit + '-ok');
    const ngBtn = document.getElementById('btn-' + habit + '-ng');
    const card = document.getElementById('card-' + habit);
    const badge = document.getElementById('streak-' + habit + '-today');

    okBtn.className = 'status-btn' + (val === 'ok' ? ' active-ok' : '');
    ngBtn.className = 'status-btn' + (val === 'ng' ? ' active-ng' : '');
    card.className = 'habit-card' + (val === 'ok' ? ' done' : '');

    const streak = getStreak(habit);
    badge.textContent = streak + '日連続';
    badge.className = 'streak-badge' + (streak >= 3 ? ' hot' : '');
  });
}

function renderSummary(habit) {
  const streak = getStreak(habit);
  const best = getBestStreak(habit);
  const total = getTotalOk(habit);
  const el = document.getElementById('summary-' + habit);
  el.innerHTML = `
    <div class="streak-card">
      <div class="s-label">現在の連続</div>
      <div class="s-num">${streak}</div>
      <div class="s-unit">日連続達成</div>
    </div>
    <div class="streak-card">
      <div class="s-label">最長連続</div>
      <div class="s-num">${best}</div>
      <div class="s-unit">日</div>
    </div>
  `;
}

function renderCalendar(habit) {
  const m = calMonths[habit];
  const year = m.getFullYear();
  const month = m.getMonth();
  const todayK = todayStr();

  document.getElementById('cal-label-' + habit).textContent =
    year + '年' + (month+1) + '月';

  const grid = document.getElementById('cal-' + habit);
  const dows = ['日','月','火','水','木','金','土'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const first = new Date(year, month, 1).getDay();
  for (let i = 0; i < first; i++) html += `<div class="cal-day empty"></div>`;

  const days = new Date(year, month+1, 0).getDate();
  const todayDate = new Date();
  todayDate.setHours(0,0,0,0);

  for (let d = 1; d <= days; d++) {
    const k = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const cellDate = new Date(year, month, d);
    const isPast = cellDate < todayDate;
    const isToday = k === todayK;
    const val = data[k] && data[k][habit];

    let cls = 'cal-day';
    if (val === 'ok') {
      cls += ' ok';
    } else if (val === 'ng') {
      cls += ' ng';
    } else if (isPast) {
      // 入力なし＋過去 → 未達成（赤）
      cls += ' ng';
    }
    if (isToday) cls += ' today-mark';
    html += `<div class="${cls}">${d}</div>`;
  }

  grid.innerHTML = html;
}

function changeMonth(habit, dir) {
  const m = calMonths[habit];
  calMonths[habit] = new Date(m.getFullYear(), m.getMonth() + dir, 1);
  renderCalendar(habit);
}

function renderAll() {
  renderToday();
  renderSummary('toilet');
  renderSummary('drink');
  renderCalendar('toilet');
  renderCalendar('drink');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['today', 'toilet', 'drink'];
    t.className = 'tab' + (names[i] === name ? ' active' : '');
  });
  document.querySelectorAll('.page').forEach(p => p.className = 'page');
  document.getElementById('page-' + name).className = 'page active';
}

renderAll();
</script>
</body>
</html>
