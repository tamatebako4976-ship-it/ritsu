<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="律">
<title>律</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
–bg: #0d0d0d;
–card: #161616;
–border: #2a2a2a;
–gold: #c9a84c;
–gold-dim: #7a6330;
–text: #e8e4dc;
–text-dim: #555;
–green: #3a6b4a;
–green-bright: #4daa6e;
–red: #6b2e2e;
–red-bright: #cc5555;
–radius: 16px;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Serif JP’, serif;
min-height: 100vh;
padding-bottom: 60px;
}

.header {
padding: 52px 20px 18px;
background: linear-gradient(180deg, #111 0%, var(–bg) 100%);
border-bottom: 1px solid var(–border);
display: flex;
justify-content: space-between;
align-items: flex-end;
}
.header h1 { font-size: 30px; font-weight: 700; color: var(–gold); letter-spacing: 0.1em; }
.header .date { font-size: 12px; color: var(–text-dim); letter-spacing: 0.1em; }

.tabs {
display: flex;
background: var(–bg);
border-bottom: 1px solid var(–border);
position: sticky;
top: 0;
z-index: 20;
}
.tab {
flex: 1;
padding: 13px 0;
text-align: center;
font-size: 12px;
color: var(–text-dim);
letter-spacing: 0.1em;
border-bottom: 2px solid transparent;
cursor: pointer;
font-family: ‘Noto Serif JP’, serif;
transition: all 0.2s;
}
.tab.active { color: var(–gold); border-bottom-color: var(–gold); }

.page { display: none; }
.page.active { display: block; }

/* TODAY */
#page-today { padding: 20px; }

.habit-block {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 20px;
margin-bottom: 16px;
}
.habit-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 16px;
}
.habit-name { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
.streak-info { text-align: right; }
.streak-num { font-size: 26px; font-weight: 700; color: var(–gold); line-height: 1; }
.streak-label { font-size: 10px; color: var(–text-dim); letter-spacing: 0.05em; }

.big-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.big-btn {
padding: 22px 10px;
border-radius: 12px;
border: 2px solid var(–border);
background: #1e1e1e;
color: var(–text-dim);
font-size: 17px;
font-family: ‘Noto Serif JP’, serif;
letter-spacing: 0.1em;
cursor: pointer;
transition: all 0.15s;
text-align: center;
}
.big-btn.ok { background: var(–green); border-color: var(–green-bright); color: #aaffcc; font-weight: 700; }
.big-btn.ng { background: var(–red); border-color: var(–red-bright); color: #ffaaaa; font-weight: 700; }

.rate-bar-wrap { margin-top: 14px; }
.rate-label { display: flex; justify-content: space-between; font-size: 11px; color: var(–text-dim); margin-bottom: 5px; }
.rate-bar { height: 4px; background: var(–border); border-radius: 2px; overflow: hidden; }
.rate-fill { height: 100%; background: var(–gold); border-radius: 2px; transition: width 0.4s ease; }

/* CALENDAR PAGE */
.cal-page { padding: 20px; }

.summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.summary-card { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 14px 10px; text-align: center; }
.summary-card .s-val { font-size: 26px; font-weight: 700; color: var(–gold); line-height: 1; }
.summary-card .s-lbl { font-size: 10px; color: var(–text-dim); margin-top: 4px; letter-spacing: 0.05em; }

.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.cal-month { font-size: 15px; font-weight: 700; color: var(–text); letter-spacing: 0.05em; }
.cal-nav-btn {
background: var(–card); border: 1px solid var(–border); color: var(–text-dim);
width: 32px; height: 32px; border-radius: 8px; font-size: 16px; cursor: pointer;
}

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-dow { text-align: center; font-size: 10px; color: var(–text-dim); padding: 4px 0 6px; }
.cal-day {
aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center;
font-size: 13px; color: var(–text-dim); background: var(–card); cursor: pointer;
transition: all 0.15s; border: 1px solid transparent;
}
.cal-day.empty { background: transparent; cursor: default; border: none; }
.cal-day.ok { background: var(–green); color: #aaffcc; font-weight: 700; border-color: var(–green-bright); }
.cal-day.ng { background: var(–red); color: #ffaaaa; border-color: var(–red-bright); }
.cal-day.today-mark { border-color: var(–gold) !important; }
.cal-day:not(.empty):active { transform: scale(0.9); }

.cal-legend { display: flex; gap: 16px; margin-top: 14px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(–text-dim); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* MODAL */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal {
background: #1a1a1a; border-radius: 20px 20px 0 0;
padding: 24px 20px 44px; width: 100%; border-top: 1px solid var(–border);
}
.modal-title { font-size: 16px; font-weight: 700; color: var(–gold); margin-bottom: 20px; text-align: center; }
.modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.modal-btn {
padding: 18px; border-radius: 12px; border: 2px solid var(–border);
background: #222; color: var(–text-dim); font-size: 16px;
font-family: ‘Noto Serif JP’, serif; cursor: pointer; transition: all 0.15s;
}
.modal-btn.ok { background: var(–green); border-color: var(–green-bright); color: #aaffcc; font-weight: 700; }
.modal-btn.ng { background: var(–red); border-color: var(–red-bright); color: #ffaaaa; font-weight: 700; }
.modal-cancel {
width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(–border);
background: transparent; color: var(–text-dim); font-size: 14px;
font-family: ‘Noto Serif JP’, serif; cursor: pointer; margin-top: 8px; display: block;
}
</style>

</head>

<div class="page" id="page-toilet">
  <div class="cal-page">
    <div class="summary-row" id="sum-toilet"></div>
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth('toilet',-1)">‹</button>
      <div class="cal-month" id="clabel-toilet"></div>
      <button class="cal-nav-btn" onclick="changeMonth('toilet',1)">›</button>

    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-bright)"></div>達成</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red-bright)"></div>未達成</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--card);border:1px solid var(--border)"></div>未記録</div>

<!-- DRINK CAL -->

<div class="page" id="page-drink">
  <div class="cal-page">
    <div class="summary-row" id="sum-drink"></div>
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth('drink',-1)">‹</button>
      <div class="cal-month" id="clabel-drink"></div>
      <button class="cal-nav-btn" onclick="changeMonth('drink',1)">›</button>
    </div>
    <div class="cal-grid" id="cal-drink"></div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-bright)"></div>達成</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red-bright)"></div>未達成</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--card);border:1px solid var(--border)"></div>未記録</div>
    </div>
    <p style="text-align:center;font-size:11px;color:var(--text-dim);margin-top:14px;">日付をタップして編集できます</p>
  </div>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="modal" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-buttons">
      <button class="modal-btn" id="modal-ok-btn" onclick="modalSet('ok')">✓ 達成</button>
      <button class="modal-btn" id="modal-ng-btn" onclick="modalSet('ng')">✗ 未達成</button>
    </div>
    <button class="modal-cancel" onclick="modalClear()">この日の記録を消す</button>
    <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script>
const KEY = "ritsu_v2";
let data = JSON.parse(localStorage.getItem(KEY) || "{}");
let calMonths = { toilet: new Date(), drink: new Date() };
let modalState = { habit: null, dateKey: null };

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

function setToday(habit, val) {
  const k = todayStr();
  if(!data[k]) data[k]={};
  if(data[k][habit]===val) delete data[k][habit];
  else data[k][habit]=val;
  save(); renderAll();
}

function getStreak(habit) {
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  let d = new Date(todayDate), streak = 0;
  const tk = todayStr();
  if(!data[tk] || data[tk][habit]===undefined) d.setDate(d.getDate()-1);
  while(true) {
    const k = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if(data[k] && data[k][habit]==='ok') { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function getBest(habit) {
  const keys = Object.keys(data).sort();
  let best=0, cur=0;
  for(const k of keys) {
    if(data[k][habit]==='ok'){cur++;if(cur>best)best=cur;}
    else cur=0;
  }
  return best;
}

function getMonthRate(habit) {
  const now = new Date();
  const y=now.getFullYear(), m=now.getMonth(), today=now.getDate();
  let ok=0, total=0;
  for(let d=1;d<=today;d++) {
    const k=y+'-'+pad(m+1)+'-'+pad(d);
    const val=data[k]&&data[k][habit];
    const isToday=(d===today);
    if(val==='ok') ok++;
    if(!isToday) total++;
    else if(val!==undefined) total++;
  }
  return total===0 ? 0 : Math.round(ok/total*100);
}

function getTotalOk(habit) {
  return Object.values(data).filter(v=>v[habit]==='ok').length;
}

function fireLabel(streak, name) {
  if(streak>=30) return name+' 🔥🔥🔥';
  if(streak>=7)  return name+' 🔥🔥';
  if(streak>=3)  return name+' 🔥';
  return name;
}

function renderToday() {
  const k = todayStr();
  const d = data[k]||{};
  const now = new Date();
  document.getElementById('todayLabel').textContent =
    now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';

  ['toilet','drink'].forEach(habit => {
    const val = d[habit];
    const streak = getStreak(habit);
    const rate = getMonthRate(habit);
    const prefix = habit==='toilet'?'t':'d';
    const name = habit==='toilet'?'トイレ掃除':'禁酒';

    document.getElementById('streak-'+habit).textContent = streak;
    document.getElementById(habit+'-name').textContent = fireLabel(streak, name);
    document.getElementById(prefix+'btn-ok').className = 'big-btn'+(val==='ok'?' ok':'');
    document.getElementById(prefix+'btn-ng').className = 'big-btn'+(val==='ng'?' ng':'');
    document.getElementById('rate-'+habit).textContent = rate+'%';
    document.getElementById('rbar-'+habit).style.width = rate+'%';
  });
}

function renderSummary(habit) {
  const streak=getStreak(habit), best=getBest(habit), rate=getMonthRate(habit);
  document.getElementById('sum-'+habit).innerHTML = `
    <div class="summary-card"><div class="s-val">${streak}</div><div class="s-lbl">現在の連続</div></div>
    <div class="summary-card"><div class="s-val">${best}</div><div class="s-lbl">最長連続</div></div>
    <div class="summary-card"><div class="s-val">${rate}%</div><div class="s-lbl">今月の達成率</div></div>
  `;
}

function renderCalendar(habit) {
  const m=calMonths[habit], y=m.getFullYear(), mo=m.getMonth();
  const todayK=todayStr();
  const todayDate=new Date(); todayDate.setHours(0,0,0,0);
  document.getElementById('clabel-'+habit).textContent = y+'年'+(mo+1)+'月';

  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(y,mo,1).getDay();
  for(let i=0;i<first;i++) html+=`<div class="cal-day empty"></div>`;
  const days=new Date(y,mo+1,0).getDate();
  for(let d=1;d<=days;d++) {
    const k=y+'-'+pad(mo+1)+'-'+pad(d);
    const cellDate=new Date(y,mo,d);
    const isPast=cellDate<todayDate;
    const isToday=k===todayK;
    const val=data[k]&&data[k][habit];
    let cls='cal-day';
    if(val==='ok') cls+=' ok';
    else if(val==='ng') cls+=' ng';
    else if(isPast) cls+=' ng';
    if(isToday) cls+=' today-mark';
    html+=`<div class="${cls}" onclick="openModal('${habit}','${k}')">${d}</div>`;
  }
  document.getElementById('cal-'+habit).innerHTML=html;
}

function changeMonth(habit, dir) {
  const m=calMonths[habit];
  calMonths[habit]=new Date(m.getFullYear(),m.getMonth()+dir,1);
  renderCalendar(habit); renderSummary(habit);
}

function openModal(habit, dateKey) {
  modalState={habit,dateKey};
  const p=dateKey.split('-');
  document.getElementById('modal-title').textContent =
    p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日　'+(habit==='toilet'?'トイレ掃除':'禁酒');
  const val=data[dateKey]&&data[dateKey][habit];
  document.getElementById('modal-ok-btn').className='modal-btn'+(val==='ok'?' ok':'');
  document.getElementById('modal-ng-btn').className='modal-btn'+(val==='ng'?' ng':'');
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }
function closeModalOverlay(e) { if(e.target===document.getElementById('modal')) closeModal(); }

function modalSet(val) {
  const {habit,dateKey}=modalState;
  if(!data[dateKey]) data[dateKey]={};
  data[dateKey][habit]=val;
  save(); renderAll(); closeModal();
}

function modalClear() {
  const {habit,dateKey}=modalState;
  if(data[dateKey]) delete data[dateKey][habit];
  save(); renderAll(); closeModal();
}

function renderAll() {
  renderToday();
  ['toilet','drink'].forEach(h=>{renderSummary(h);renderCalendar(h);});
}

function switchTab(name) {
  const names=['today','toilet','drink'];
  document.querySelectorAll('.tab').forEach((t,i)=>{ t.className='tab'+(names[i]===name?' active':''); });
  document.querySelectorAll('.page').forEach(p=>p.className='page');
  document.getElementById('page-'+name).className='page active';
}

renderAll();
</script>
