<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>律 - Discipline</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #1a1a1a;
    --accent: #fbbf24;
    --text: #eee;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
    margin: 0;
    -webkit-tap-highlight-color: transparent; /* タップ時の青枠を消す */
  }
  h2 { margin-top: 10px; border-left: 4px solid var(--accent); padding-left: 10px; }
  #date { margin-bottom: 20px; color: #888; font-weight: bold; }

.card {
background: var(–card);
padding: 18px;
margin-bottom: 12px;
border-radius: 12px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

button {
padding: 10px 20px;
border-radius: 8px;
border: 2px solid #444;
background: transparent;
color: #fff;
font-size: 16px;
transition: 0.2s;
cursor: pointer;
}
button.active {
background: var(–accent);
color: #000;
border-color: var(–accent);
font-weight: bold;
}

#pnlArea {
margin-top: 15px;
background: #222;
padding: 15px;
border-radius: 8px;
animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

input {
width: 100%;
box-sizing: border-box;
padding: 12px;
font-size: 18px; /* iOSでズームさせないために16px以上にする */
background: #333;
border: 1px solid #444;
color: #fff;
border-radius: 6px;
margin-top: 5px;
/* 数字キーボード用 */
-webkit-appearance: none;
}

h3 {
text-align: right;
margin-top: 20px;
color: var(–accent);
}
</style>

</head>
<body>

<h2>律 - Discipline</h2>
<div id="date"></div>

<div class="card">
  <span>トイレ掃除</span>
  <button onclick="toggle('toilet')" id="toilet">✓</button>
</div>

<div class="card">
  <span>禁酒</span>
  <button onclick="toggle('nodrink')" id="nodrink">✓</button>
</div>

<div class="card" style="flex-direction: column; align-items: stretch;">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <span>トレード</span>
    <button onclick="toggle('trade')" id="trade">✓</button>
  </div>
  <div id="pnlArea" style="display:none">
    <label style="font-size: 12px; color: #888;">本日の損益 (円)</label>
    <input type="number" id="pnl" inputmode="decimal" placeholder="例: 5000" oninput="savePnl()">
  </div>
</div>

<h3 id="total">累計: 0円</h3>

<script>
const KEY = "discipline_final_v2";
let data = JSON.parse(localStorage.getItem(KEY) || "{}");

// 日付を YYYY-MM-DD 形式で取得（iPhoneでのバグを防ぐ）
function today() {
    const d = new Date();
    return d.getFullYear() + '-' + 
           String(d.getMonth() + 1).padStart(2, '0') + '-' + 
           String(d.getDate()).padStart(2, '0');
}

function render() {
    const k = today();
    const d = data[k] || {};
    document.getElementById("date").innerText = k.replace(/-/g, '/');

    ["toilet", "nodrink", "trade"].forEach(id => {
        const btn = document.getElementById(id);
        if (d[id]) {
            btn.classList.add("active");
        } else {
            btn.classList.remove("active");
        }
    });

    const pnlArea = document.getElementById("pnlArea");
    const pnlInput = document.getElementById("pnl");
    
    if (d.trade) {
        pnlArea.style.display = "block";
        pnlInput.value = d.pnl !== undefined ? d.pnl : "";
    } else {
        pnlArea.style.display = "none";
    }

    let total = 0;
    Object.values(data).forEach(v => {
        total += Number(v.pnl) || 0;
    });
    document.getElementById("total").innerText = "累計: " + total.toLocaleString() + "円";
}

function toggle(id) {
    const k = today();
    if (!data[k]) data[k] = {};
    
    data[k][id] = !data[k][id];
    
    // トレードのチェックを外した時は損益をリセットするか検討が必要ですが、
    // ここでは入力欄を隠すだけに留めるか、値を0にする処理を入れます
    if (id === "trade" && !data[k][id]) {
        data[k].pnl = 0;
    }
    
    save();
    render();
}

function savePnl() {
    const k = today();
    if (!data[k]) data[k] = {};
    const val = document.getElementById("pnl").value;
    data[k].pnl = val === "" ? 0 : parseInt(val);
    save();
    // 累計だけリアルタイム更新
    updateTotalOnly();
}

function updateTotalOnly() {
    let total = 0;
    Object.values(data).forEach(v => {
        total += Number(v.pnl) || 0;
    });
    document.getElementById("total").innerText = "累計: " + total.toLocaleString() + "円";
}

function save() {
    localStorage.setItem(KEY, JSON.stringify(data));
}

// 初回実行
render();
</script>

</body>
</html>
