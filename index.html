<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>律</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
--bg: #0d0d0d;
--card: #161616;
--border: #2a2a2a;
--gold: #c9a84c;
--gold-dim: #7a6330;
--text: #e8e4dc;
--text-dim: #555;
--green: #3a6b4a;
--green-bright: #4daa6e;
--red: #6b2e2e;
--red-bright: #cc5555;
--radius: 16px;
}

/* リセット */
* {
box-sizing: border-box;
margin: 0;
padding: 0;
-webkit-tap-highlight-color: transparent;
}

body {
background: #0d0d0d;
background: var(--bg);
color: var(--text);
font-family: 'Noto Serif JP', serif;
min-height: 100vh;
padding-bottom: 60px;
}

/* ヘッダー */
.header {
padding: 52px 20px 18px;
background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
border-bottom: 1px solid var(--border);
display: flex;
justify-content: space-between;
align-items: flex-end;
}
.header h1 {
font-size: 30px;
color: var(--gold);
}
.header .date {
font-size: 12px;
color: var(--text-dim);
}

/* タブ */
.tabs {
display: flex;
background: var(--bg);
border-bottom: 1px solid var(--border);
position: sticky;
top: 0;
}
.tab {
flex: 1;
padding: 13px 0;
text-align: center;
font-size: 12px;
color: var(--text-dim);
border-bottom: 2px solid transparent;
cursor: pointer;
}
.tab.active {
color: var(--gold);
border-bottom-color: var(--gold);
}

/* ページ */
.page { display: none; }
.page.active { display: block; }

#page-today { padding: 20px; }

/* カード */
.habit-block {
background: var(--card);
border: 1px solid var(--border);
border-radius: var(--radius);
padding: 20px;
margin-bottom: 16px;
}

.habit-header {
display: flex;
justify-content: space-between;
margin-bottom: 16px;
}

.habit-name {
font-size: 20px;
font-weight: 700;
}

.streak-num {
font-size: 26px;
color: var(--gold);
}

/* ボタン */
.big-buttons {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

.big-btn {
padding: 22px 10px;
border-radius: 12px;
border: 2px solid var(--border);
background: #1e1e1e;
color: var(--text-dim);
font-size: 17px;
cursor: pointer;
}

.big-btn.ok {
background: var(--green);
color: #aaffcc;
}

.big-btn.ng {
background: var(--red);
color: #ffaaaa;
}

/* レートバー */
.rate-bar {
height: 4px;
background: var(--border);
margin-top: 8px;
}
.rate-fill {
height: 100%;
background: var(--gold);
}

/* カレンダー */
.cal-page { padding: 20px; }

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 5px;
}

.cal-day {
aspect-ratio: 1;
display: flex;
align-items: center;
justify-content: center;
background: var(--card);
border-radius: 8px;
font-size: 13px;
}

.cal-day.ok { background: var(--green); }
.cal-day.ng { background: var(--red); }

.cal-day.today-mark {
border: 1px solid var(--gold);
}
</style>
</head>

<body>

<div class="header">
  <h1>律</h1>
  <div class="date" id="todayLabel"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">今日</div>
  <div class="tab" onclick="switchTab('toilet')">トイレ掃除</div>
  <div class="tab" onclick="switchTab('drink')">禁酒</div>
</div>

<div class="page active" id="page-today">
  <div class="habit-block">
    <div class="habit-header">
      <div class="habit-name">トイレ掃除</div>
      <div class="streak-num" id="streak-toilet">0</div>
    </div>
    <div class="big-buttons">
      <button class="big-btn" onclick="setToday('toilet','ok')">達成</button>
      <button class="big-btn" onclick="setToday('toilet','ng')">未達成</button>
    </div>
  </div>
</div>

<script>
const KEY = "ritsu_v2";
let data = JSON.parse(localStorage.getItem(KEY) || "{}");

function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function setToday(habit,val){
  const k = todayStr();
  if(!data[k]) data[k]={};
  data[k][habit]=val;
  localStorage.setItem(KEY,JSON.stringify(data));
  render();
}

function getStreak(habit){
  let streak=0;
  let d=new Date();
  while(true){
    const k=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
    if(data[k] && data[k][habit]==="ok"){
      streak++;
      d.setDate(d.getDate()-1);
    }else break;
  }
  return streak;
}

function render(){
  document.getElementById("todayLabel").textContent = new Date().toLocaleDateString();
  document.getElementById("streak-toilet").textContent = getStreak("toilet");
}

render();
</script>

</body>
</html>
